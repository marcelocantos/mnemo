name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
            cc: cc
            cxx: c++
            ar: ar
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
            cc: cc
            cxx: c++
            ar: ar
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
            cc: cc
            cxx: c++
            ar: ar
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
            # -H=windowsgui so Scheduled-Task launch does not pop a
            # console window (console_windows.go re-attaches stdio
            # when launched from a shell). -extldflags "-static"
            # static-links the MinGW runtime so end users do not
            # need MinGW-w64 DLLs on their PATH.
            ldflags_extra: '-H=windowsgui -extldflags "-static"'
            # windows-latest has MinGW-w64 GCC preinstalled; bare
            # names resolve via PATH.
            cc: gcc
            cxx: g++
            ar: ar
          - os: windows-latest
            goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
            ldflags_extra: '-H=windowsgui -extldflags "-static"'
            # Cross-compile via llvm-mingw, installed in the
            # "Install llvm-mingw" step below. Its binaries land in
            # PATH via GITHUB_PATH, so these bare names resolve.
            cc: aarch64-w64-mingw32-clang
            cxx: aarch64-w64-mingw32-clang++
            ar: aarch64-w64-mingw32-ar
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          path: mnemo

      - uses: actions/checkout@v4
        with:
          repository: marcelocantos/sqldeep
          path: sqldeep

      - name: Install llvm-mingw (windows/arm64 cross)
        # windows-latest has x86_64 MinGW GCC preinstalled but no
        # arm64 target. Install llvm-mingw — a Windows-hosted,
        # ARM64-targeting clang + binutils bundle — and prepend it
        # to PATH so `aarch64-w64-mingw32-clang` etc. resolve.
        if: matrix.goos == 'windows' && matrix.goarch == 'arm64'
        shell: pwsh
        run: |
          $ver = "20250528"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$ver/llvm-mingw-$ver-ucrt-x86_64.zip"
          Invoke-WebRequest $url -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath .
          $bin = (Resolve-Path ".\llvm-mingw-$ver-ucrt-x86_64\bin").Path
          Write-Output "Adding to PATH: $bin"
          Add-Content $env:GITHUB_PATH $bin

      - name: Build sqldeep
        working-directory: sqldeep
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          AR: ${{ matrix.ar }}
        run: |
          mkdir -p build
          "$CXX" -std=c++20 -Wall -Wextra -Wpedantic -Idist -Ivendor/include -c dist/sqldeep.cpp -o build/sqldeep.o
          "$CC" -w -Idist -Ivendor/include -c dist/sqldeep_xml.c -o build/sqldeep_xml.o
          "$AR" rcs build/libsqldeep.a build/sqldeep.o

      - uses: actions/setup-go@v5
        with:
          go-version-file: mnemo/go.mod

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          LDFLAGS_EXTRA: ${{ matrix.ldflags_extra }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          AR: ${{ matrix.ar }}
        working-directory: mnemo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags "sqlite_fts5" \
            -ldflags "-s -w ${LDFLAGS_EXTRA}" \
            -o "mnemo${{ matrix.ext }}" .
          case "${{ matrix.archive }}" in
            tar.gz)
              tar czf "mnemo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "mnemo${{ matrix.ext }}"
              ;;
            zip)
              7z a "mnemo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "mnemo${{ matrix.ext }}"
              ;;
          esac

      - name: Build Windows installer
        if: matrix.goos == 'windows'
        working-directory: mnemo
        shell: bash
        env:
          # MSYS path-conversion mangles ISCC's slash-prefixed flags
          # (/DAppVersion=..., /O.) into Windows paths before exec,
          # causing ISCC to treat them as extra script filenames.
          MSYS_NO_PATHCONV: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Stage alongside the .iss file so Inno Setup's relative
          # Source: paths (resolved from the .iss file's directory)
          # find LICENSE.txt and mnemo.exe.
          STAGE=installer/windows/dist
          mkdir -p "$STAGE"
          cp "mnemo.exe" "$STAGE/"
          cp LICENSE "$STAGE/LICENSE.txt"
          # Inno Setup 6 is preinstalled on windows-latest amd64 runners
          # but not on the windows-11-arm image. Install via Chocolatey
          # when missing so both matrix legs work identically. Inno
          # Setup itself is x86, but runs fine under the x86 emulator
          # on arm64 and produces arch-native payload installers when
          # the .iss ArchitecturesInstallIn64BitMode directive is set
          # appropriately (we do that via /DArch).
          ISCC="/c/Program Files (x86)/Inno Setup 6/iscc.exe"
          if [[ ! -f "$ISCC" ]]; then
            choco install innosetup --no-progress -y
          fi
          "$ISCC" "/DAppVersion=${VERSION}" \
            "/DSourceDir=dist" \
            "/DArch=${{ matrix.goarch }}" \
            "/O." \
            installer/windows/mnemo.iss
          # Output is named mnemo-${VERSION}-windows-${ARCH}-setup.exe
          # per OutputBaseFilename in the .iss file.
          ls -la "mnemo-${VERSION}-windows-${{ matrix.goarch }}-setup.exe"

      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mnemo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "mnemo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}"

      - name: Upload Windows installer
        if: matrix.goos == 'windows'
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mnemo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "mnemo-${VERSION}-windows-${{ matrix.goarch }}-setup.exe"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mnemo
      - uses: actions/checkout@v4
        with:
          repository: marcelocantos/sqldeep
          path: sqldeep
      - name: Build sqldeep
        run: |
          cd sqldeep && mkdir -p build
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Idist -Ivendor/include -c dist/sqldeep.cpp -o build/sqldeep.o
          cc -w -Idist -Ivendor/include -c dist/sqldeep_xml.c -o build/sqldeep_xml.o
          ar rcs build/libsqldeep.a build/sqldeep.o
      - uses: actions/setup-go@v5
        with:
          go-version-file: mnemo/go.mod
      - run: cd mnemo && go test -tags "sqlite_fts5" ./...

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "mnemo" => "mnemo"'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"mnemo", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            depends_on "gh"
            depends_on "uv"
            depends_on "tesseract"
            depends_on "poppler"
            depends_on "mupdf"

            service do
              run [opt_bin/"mnemo"]
              keep_alive true
              log_path var/"log/mnemo.log"
              error_log_path var/"log/mnemo.log"
              working_dir HOMEBREW_PREFIX
              environment_variables PATH: "#{HOMEBREW_PREFIX}/bin:#{HOMEBREW_PREFIX}/sbin:#{ENV["HOME"]}/.cargo/bin:#{ENV["HOME"]}/.local/bin:#{ENV["HOME"]}/.py/bin:#{ENV["HOME"]}/go/bin:#{ENV["HOME"]}/.claude/local:/usr/bin:/bin:/usr/sbin:/sbin"
            end
