name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: mnemo

      - uses: actions/checkout@v4
        with:
          repository: marcelocantos/sqldeep
          path: sqldeep

      - name: Build sqldeep
        run: |
          cd sqldeep && mkdir -p build
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Idist -Ivendor/include -c dist/sqldeep.cpp -o build/sqldeep.o
          cc -w -Idist -Ivendor/include -c dist/sqldeep_xml.c -o build/sqldeep_xml.o
          ar rcs build/libsqldeep.a build/sqldeep.o

      - uses: actions/setup-go@v5
        with:
          go-version-file: mnemo/go.mod

      - name: Build
        env:
          CGO_ENABLED: "1"
        working-directory: mnemo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags "sqlite_fts5" \
            -ldflags "-s -w" \
            -o mnemo .
          tar czf "mnemo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" mnemo

      - name: Upload release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: mnemo
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" \
            "mnemo-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mnemo
      - uses: actions/checkout@v4
        with:
          repository: marcelocantos/sqldeep
          path: sqldeep
      - name: Build sqldeep
        run: |
          cd sqldeep && mkdir -p build
          c++ -std=c++20 -Wall -Wextra -Wpedantic -Idist -Ivendor/include -c dist/sqldeep.cpp -o build/sqldeep.o
          cc -w -Idist -Ivendor/include -c dist/sqldeep_xml.c -o build/sqldeep_xml.o
          ar rcs build/libsqldeep.a build/sqldeep.o
      - uses: actions/setup-go@v5
        with:
          go-version-file: mnemo/go.mod
      - run: cd mnemo && go test -tags "sqlite_fts5" ./...

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "mnemo" => "mnemo"'
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          test: 'system bin/"mnemo", "--version"'
          skip_checksum: true
          update_readme_table: true
          formula_includes: |
            service do
              run [opt_bin/"mnemo", "serve"]
              keep_alive true
              log_path var/"log/mnemo.log"
              error_log_path var/"log/mnemo.log"
              working_dir HOMEBREW_PREFIX
            end
