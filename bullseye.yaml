  T25.2:
    name: Compactor and /c reworked around connection identity, with ctrl-c + continue recovery
    status: achieved
    value: 8.0
    cost: 5.0
    actual_cost: 5.0
    acceptance:
    - compactions table gains a connection_id column (nullable for pre-upgrade rows) alongside the existing session_id.
    - compact.Watcher spawns one compactor goroutine per live connection (not per session); idle reaping moves from 'absent from LiveSessions' to 'connection closed'.
    - A new connection_sessions table records (connection_id, session_id, first_seen_at, last_seen_at) PK (connection_id, session_id) and is populated whenever a request resolves a session ID for its connection (initially via mnemo_self; later via any request-bound session identity).
    - mnemo_restore(session_id=X) resolves X's connection_id via connection_sessions and returns the compactions tagged to that connection's prior session spans — oldest first — plus any across-restart recovery compactions whose session_id matches X (for ctrl-c + `claude --continue` recovery).
    - '/c, as a user-visible skill, behaves unchanged for the user: after /clear, the compacted context from the prior span is inserted. The mechanism underneath is connection-scoped, not chain-scoped.'
    - After a ctrl-c of Claude Code followed by `claude --continue`, the reopened session's subsequent /c call dumps in the compacted context that was accumulated in the previous process run. Recovery relies on session_id persistence (which `--continue` provides) to find the prior connection's compactions.
    - Token-budget guard (T10 AC6) continues to function — the ratio is now measured per-connection rather than per-session.
    context: |-
      The user-facing promise of /c is unchanged: after /clear, get the prior span's context back. Under this target the underlying mechanism shifts to be robust against long-delay /clears, concurrent tabs, and ctrl-c recovery scenarios the heuristic-based T10 implementation cannot handle.

      **Key design decisions:**

      - Compactions are keyed by connection_id primarily, with session_id retained as a secondary key for recovery. A single compaction row may be written during one session span but retrieved later by either key.
      - Ctrl-c + `claude --continue` re-uses the same session_id on disk (Claude Code's documented behaviour). A new process gets a new proxy and new connection_id, but mnemo_restore can still reach compactions via session_id.
      - The session_id → connection_id binding is discovered lazily: when a connection makes its first call that resolves a session ID (e.g. mnemo_self), the daemon writes the binding. No proactive handshake about session identity is required.
      - Token budget (compaction tokens < 10% of session tokens) is measured per-connection now; the maths is the same.

      **Interaction with T10 tests:** existing compact/watcher tests use a fake session source. They will need a fake connection source (or a more general fake that provides both) to exercise the new scoping. Expected churn: medium.
    depends_on:
    - T25.1
    tags:
    - compactor
    - restore
    - user-facing
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T25.3:
    name: session_chains records only definitive observations; chain inference is a query-time function
    status: achieved
    value: 3.0
    cost: 2.0
    actual_cost: 2.0
    acceptance:
    - 'session_chains is written by exactly one path: the connection observer, on session transitions within a connection. Rows carry mechanism=''mcp_connection'' and confidence=''definitive''. No ingest-time writes, no UPSERT/supersede logic.'
    - detectChainForSession, clearMarkerRE, and backfillSessionChains are deleted from store.go. The cwd heuristic from 8f8c3b9 is removed from the ingest path.
    - A new store method InferChainHeuristic(sessionID, params) computes cwd-based predecessor candidates on demand from session_summary + session_meta. Pure function — no DB writes, no cached state. Parameters cover window, max-candidates, single-vs-multi match.
    - 'mnemo_chain composes the two layers: session_chains lookup first (definitive), InferChainHeuristic fallthrough for sessions with no definitive row. Each returned link is attributed to its mechanism so callers can distinguish authoritative observation from runtime inference.'
    - 'mnemo_chain accepts a mode parameter: ''auto'' (default — definitive first, heuristic if none), ''strict'' (definitive only, return empty if no binding), ''candidates'' (always return heuristic candidates alongside any definitive row, so ambiguity is visible). Other tools can consume the same InferChainHeuristic primitive directly.'
    - 'Tests cover: (a) definitive row from a live connection transition; (b) no definitive row present — heuristic candidates surfaced at query time; (c) both present — definitive returned in ''auto'' mode, heuristic additionally returned in ''candidates'' mode; (d) strict mode returns nothing when no definitive row exists.'
    context: |-
      Re-architected 2026-04-15. Originally modeled as two ingest-time writers to session_chains with supersede logic; the cleaner shape is one writer (definitive, ephemeral-signal, worth persisting) and one query-time function (heuristic, rederivable from primary data, parameterisable).

      Motivation:
      - Definitive links come from a live process observation. Once the connection closes, the information is unrecoverable from the JSONL alone. Persisting them is the only way to retain that signal.
      - Heuristic links are recomputable at any time from persistent data (cwd, timestamps, /clear markers). Baking them into the DB freezes one particular rule and obscures ambiguity; computing them at query time lets the rule evolve, lets callers parameterise, and lets genuinely ambiguous cases be surfaced as ambiguous rather than silently resolved.
      - Different callers want different things. A quick 'where did this come from' call wants one best guess; a recovery-UI view wants candidates with confidence scores; a strict audit wants definitive-only. None of that is reachable with pre-baked rows.

      Side benefit: first-install and daemon-downtime are handled naturally by the query-time layer without any special-case plumbing. There is nothing to backfill because nothing was supposed to be filled \u2014 the heuristic runs against live query inputs.

      Consequence for T25.2: mnemo_restore resolves session \u2192 connection via connection_sessions (definitive, cheap, deterministic) and returns that connection's compactions. If a session has no connection binding, there is also no compaction for it (compactor requires a live connection to produce anything), so there is no fallback to consider.

      The chain-heuristic commit 8f8c3b9 gets its cwd-most-recent rule migrated into InferChainHeuristic rather than removed outright \u2014 the rule is good, it just belongs in the query layer, not the ingest layer.</context>
      <parameter name="tags">["chain", "query-time-inference", "connection-identity", "ephemeral-signal"]</parameter>
      </invoke>
    depends_on:
    - T25.1
    tags:
    - chain
    - side-product
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T26:
    name: Adopt sqlpipe.Database as mnemo's SQLite layer
    status: set_aside
    value: 13.0
    cost: 8.0
    showcase: true
    set_aside_reason: |-
      Won't fix 2026-05-09. The three pillars that justified adopting sqlpipe.Database all collapsed: (1) sqlift bundled-in is now obtainable standalone via 🎯T49, (2) sqldeep-on-every-query is cosmetic — internal Go callsites are fine in plain SQL, and (3) the replication primitives have no caller. T15 federation was achieved 2026-04-25 as query fan-out (peer-to-peer SQLite, no replication), and the only other federation model under consideration is org-/repo-centralized aggregation to a server DB — for which sqlpipe is fundamentally the wrong shape: sqlpipe assumes one master per table with read-only replicas, while centralization needs many writers contributing to a single authoritative server-DB corpus. The previously identified cost remains the same (148 Exec/Query/QueryRow callsites + 180 Scan sites, non-mechanical migration). Cost stays high; benefits collapsed; close the door. If a future need surfaces a primitive that sqlpipe genuinely provides, raise it as a fresh, scope-specific target rather than reviving this one.

      Prior parking reason (2026-04-30): Blocked on sqlpipe 🎯T13 — the sqlpipe Go wrapper does not yet expose FTS5, sqlift Go bindings, or automatic sqldeep transpilation (verified empirically by the T26 surveyor on 2026-04-29). Resume when sqlpipe T13 ships and the Go wrapper exposes the three required capabilities. Re-frontier this target at that point; the v0.18.0/v0.19.0 schema-window argument from the original framing remains valid but is not load-bearing on the parked decision.
    acceptance:
    - mnemo's Store replaces the database/sql + mattn/go-sqlite3 layer with sqlpipe.Database as the primary DB handle. Calls like s.db.Exec, s.db.Query, and s.db.QueryRow become their sqlpipe.Database equivalents; s.rwmu serialisation is reviewed against sqlpipe's concurrency model.
    - 'Schema migration via sqlift is live: a single authoritative schema.sql file is the source of truth. At Store.New, sqlpipe.Database''s built-in sqlift diffs the current DB against schema.sql and applies the delta. The wipe-on-schemaVersion-mismatch branch is deleted.'
    - 'Ephemeral data (daemon_connections, connection_sessions, session_chains, compactions) survives schema bumps by construction — sqlift''s destructive-op guard is left on. Test: write rows to each ephemeral table, make an additive schema change, reopen, confirm rows intact.'
    - sqldeep transpilation is active on all queries passing through sqlpipe.Database, not just mnemo_query. Callers can use the `FROM ... SELECT { ... }` JSON-object syntax anywhere. No regression in existing tool outputs.
    - Replication primitives (Master/Replica/Peer) are available for 🎯T15 federation when that target comes up — not wired yet, but reachable via the same sqlpipe.Database handle that normal queries use.
    - 'CGo build flags are updated: sqlpipe vendors its own SQLite, so the mattn/go-sqlite3 -tags sqlite_fts5 path may no longer apply. make bullseye green end-to-end on darwin and linux.'
    - All existing tests pass unchanged (behaviour-preserving refactor for the DB layer).
    context: |-
      Reframed 2026-04-16. Originally scoped as "use sqlift to stop wiping the DB", with sqlpipe called out as an optional superset. User direction: the sqlpipe adoption needs to happen regardless — schema migration, sqldeep everywhere, and replication primitives are all foundation work that benefits mnemo independent of any one feature. Treat the DB-layer switch as the primary work item and the three capabilities as inherent, not optional.

      **Cross-repo prerequisite (added 2026-04-29):** This target is gated on **sqlpipe 🎯T13** ("sqlpipe Go wrapper exposes FTS5, sqlift Go bindings, and automatic sqldeep transpilation"). The T26 surveyor agent verified empirically that the sqlpipe Go wrapper today is missing all three capabilities mnemo needs — FTS5 is not enabled in cgo flags, sqlift bindings are not exposed in Go (only C++), and sqldeep transpilation is absent from Database.Exec/Query/Rows. Mnemo cannot proceed with T26 until sqlpipe T13 lands. Cross-repo link tracked in context only — bullseye does not model inter-repo deps natively.

      **What sqlpipe.Database brings (once T13 lands):**

      - **sqlift** — declarative schema migration via structural diffing. Schema lives in a single SQL file; sqlift computes and applies deltas at startup. Destructive-operation guard prevents accidental data loss. Replaces the wipe-and-rebuild machinery that would otherwise destroy ephemeral data (daemon_connections, connection_sessions, session_chains, compactions) on every schema bump.
      - **sqldeep** — JSON5-like SQL transpilation. Currently mnemo uses sqldeep selectively in mnemo_query; under sqlpipe every query transpiles by default. The JSON object construction syntax becomes available anywhere.
      - **Replication primitives** (Master/Replica/Peer/Relay) — bidirectional, transport-agnostic. Load-bearing for 🎯T15 federation if/when that lands; zero cost to have them sitting dormant until then.

      **Scope: the DB layer rewrite is the expensive part.** mnemo has ~7000 lines of Go with hundreds of `s.db.Exec` / `s.db.Query` / `s.db.QueryRow` sites, plus the `s.rwmu` read-write lock coordinating them. The T26 survey counted 148 Exec/Query/QueryRow callsites and 180 *sql.Rows.Scan sites; sqlpipe returns iter.Seq[*Row] with positional accessors, so a 1:1 mechanical migration is not possible. Each callsite needs review against sqlpipe's iterator + concurrency model.

      **Sequencing:** sqlpipe T13 first → mnemo T26 second. v0.18.0 introduced ephemeral tables; v0.19.0 has no committed schema changes yet, so the window to switch is now before any data is captured that would need migration. Practically: T26 and 🎯T22 (Windows) are independent; T26 and 🎯T15 (federation) are coupled (federation will use sqlpipe's replication).

      Discovered 2026-04-16 during /release v0.18.0 smoke testing. Cross-repo dependency on sqlpipe T13 surfaced 2026-04-29 during T26 survey by automated agent.
    origin: manual
    discovered: 2026-04-16
  T27:
    name: mnemo is a single HTTP MCP daemon with no proxy and no custom protocol
    status: achieved
    value: 13.0
    cost: 8.0
    actual_cost: 3.0
    acceptance:
    - The internal/rpc/ package is deleted and no UDS-based client-daemon communication remains.
    - main.go has a single operational mode — HTTP MCP serve. The stdio proxy mode is gone.
    - '`mnemo` (no args) runs the HTTP MCP server on :19419. CLI flags retained: --version, --help, --help-agent, --addr.'
    - The Claude Code registration command in README and agents-guide is `claude mcp add --scope user --transport http mnemo http://localhost:19419/mcp`.
    - Tools that implicitly used the proxy's cwd now accept explicit cwd or repo parameters, and the agents-guide documents which fields are expected.
    - connection_id tracking migrates to use the MCP session ID (from the Mcp-Session-Id header). Affected tables (daemon_connections, connection_sessions) are renamed or repurposed accordingly.
    - mnemo_restore continues to return the compacted context for the caller's session, anchored to MCP session ID.
    - Chain detection (T25) still produces definitive rows for sessions the daemon has seen live, now keyed on MCP session ID.
    - Homebrew service definition is unchanged conceptually (brew services start mnemo still runs the daemon).
    - Existing indexed data (entries, messages, embeddings, commits, PRs, etc.) survives the transition — no schema rebuild required for the rename.
    - Agents-guide, README, CLAUDE.md, and STABILITY.md are updated to describe the HTTP-only architecture.
    context: |-
      mnemo previously shipped as two binaries coupled by a custom UDS protocol: a stdio MCP proxy (that Claude Code launched per-session) and a serve daemon (that owned the SQLite writer, filesystem watchers, and backfill workers). The custom protocol in internal/rpc/ carried cwd, session_id, and connection_id implicitly, letting tools behave as if they were per-session even though all state lived in the daemon.

      mcpbridge has since been reworked as a generic, transparent MCP proxy — it forwards MCP frames between an agent and any upstream MCP server without interpretation. A transparent proxy cannot inject context like cwd. This invalidates the custom-protocol pattern that the mnemo proxy/daemon pair relied on.

      The resulting architecture: mnemo becomes a single HTTP MCP daemon. Claude Code registers it via `claude mcp add --scope user --transport http mnemo http://localhost:19419/mcp`, or fronts it with mcpbridge for users who want a stdio shim. Context that the proxy used to carry (cwd, session ID, connection ID) becomes explicit — either as tool parameters or as MCP session-level headers that the daemon reads directly.

      This also unblocks T22 (Windows port): the UDS protocol was the biggest portability obstacle, and HTTP MCP is cross-platform by default.

      The migration is orthogonal to the semantic-search / RAG work being scoped but should land first so that embeddings build on a stable foundation.
    origin: manual
    discovered: 2026-04-18
    achieved: 2026-04-18
