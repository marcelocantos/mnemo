    - Reconcile work is idempotent (upsert-by-id preserved) and reports its gap/last-reconcile through the T68.4 divergence surface.
    - Existing PR/CI/commit search behaviour is unchanged from the consumer side; only the freshness mechanism changes.
    - 'Egress posture is preserved: GitHub calls remain gated on the local gh auth and per-repo scope (no org fan-out), per the project''s external-egress rules.'
    context: |-
      Achieved 2026-05-29 (commits f558dd3 + aed1c51 + 3f64788 on the t68.5-mirrors branch, stacked; not yet pushed). All three external mirror streams are divergence-driven via the mirrorReconcilers registry (internal/store/mirrors.go) + mirror_status(repo, stream, last_reconciled_at) cursor:
