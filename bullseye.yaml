  T41:
    name: A repo's CLAUDE.md summary stays current — there is a defined pattern for periodically reviewing the first-paragraph summaries that mnemo_repos surfaces, so they don't silently drift away from what the project actually is
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - A documented review pattern exists (skill, scheduled agent, or periodic prompt) that compares each repo's CLAUDE.md first-paragraph summary against the repo's actual current shape (recent commits, current README, current code) and flags or rewrites stale ones.
    - The pattern is discoverable from mnemo's docs (README or agents-guide) so users adopt it instead of reading stale summaries indefinitely.
    - 'Mechanism for surfacing staleness: either (a) the review skill itself emits a per-repo report of summaries that look stale with proposed rewrites, OR (b) mnemo_repos annotates each summary with an age/staleness signal (e.g. days since CLAUDE.md last touched, OR a ''last-reviewed'' timestamp written into the file).'
    - The review pattern is bounded — it does not require reading every line of every repo on every run; it uses cheap signals (file mtime, last commit on CLAUDE.md, recent activity in the repo) to gate the expensive LLM review.
    context: |-
      Raised 2026-04-26 alongside 🎯T40. T40 makes mnemo_repos surface a one-line summary derived from each repo's CLAUDE.md. That solves the at-a-glance scan but introduces a freshness problem: summaries stop being right the moment the project pivots and CLAUDE.md gets rewritten. Without a review pattern, a stale summary is worse than no summary — it confidently misrepresents the project to every agent that reads it.

      The active-projects.md generator this is replacing handled freshness implicitly: the launchd job re-extracted the summary on every run, so a CLAUDE.md edit propagated automatically within a day. mnemo_repos under T40 either has to do the same (re-extract on every call, cheap because it's already indexed) OR rely on the indexer's update path keeping summaries in sync (CLAUDE.md changes trigger re-indexing → summary auto-refreshes). That covers extraction freshness.

      The harder freshness problem is content drift: CLAUDE.md itself gets stale. The first-paragraph hasn't changed in months but the project has. No automated extraction can catch that. Hence the need for a periodic *human-or-LLM* review pattern.

      Possible shapes for the pattern (the design question):
      1. **Periodic skill** — `/review-summaries` or similar, run weekly via the `/schedule` infrastructure. For each active repo, compares CLAUDE.md first paragraph against recent commit messages, recent session topics, and the current README; flags repos where the summary looks divergent and proposes a rewrite for user approval.
      2. **mnemo_repos annotation** — surface a staleness signal per summary (e.g., 'CLAUDE.md unchanged for 90+ days, repo has had 50 commits since' is high-staleness; 'CLAUDE.md updated last week' is low). Agents reading mnemo_repos see the signal and decide whether to trust the summary.
      3. **In-file convention** — CLAUDE.md gains a 'last-reviewed: YYYY-MM-DD' frontmatter field; mnemo_repos shows the age. A periodic review updates the field after a human/LLM check.

      Cheap-signal gating is important because doing a full LLM review of every repo every week is expensive. The review pattern should only do the expensive comparison for repos where the cheap signals (CLAUDE.md mtime vs repo last commit, recent session activity, etc.) suggest divergence is plausible.

      Sequencing: depends on 🎯T40 (need the summary surface to exist before reviewing it makes sense).
    depends_on:
    - T40
    tags:
    - mnemo_repos
    - freshness
    - claude-md
    - ops
    origin: user 2026-04-26 — "we need a pattern to periodically review these summaries and keep them up to date"
    discovered: 2026-04-26
    achieved: 2026-04-26
  T42:
    name: mnemo provides a cross-session message bus for Claude Code agents
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Won''t fix — wrong shape for the actual use case. Acceptance was a pull-based message bus assuming long-lived listener sessions. Real use case is cross-repo agent coordination ("A finishes its bit, B resumes") which Claude Code agents can''t satisfy via pull (no event loop between turns) or via RemoteTrigger composition (RemoteTrigger spawns sessions on Anthropic''s hosted infrastructure, which can''t reach localhost mnemo without the federated mTLS endpoint AND can''t push back to local sessions either). PR #59 was opened, then closed during the design discussion. Retired-then-set-aside because the original retire was premature: the work landed on a feature branch that we then killed before merging, so no production change. **Superseded by 🎯T65 (2026-05-23)** — same use case, redesigned around directory-addressed inbox notes and `/loop` for wait-on-event, with the MCP layer kept precise (required canonicalized path) and convenience pushed into the skill layer. T65 is the live target; do not revive T42.'
    acceptance:
    - mnemo exposes mnemo_message_post(topic, body, reply_to?) — posts a message to a topic
    - mnemo exposes mnemo_message_recv(topic, since?, mark_read?) — pulls messages from a topic, optionally marking read
    - mnemo exposes mnemo_message_list(topic?, unread_only?, limit) — browses without consuming
    - mnemo exposes mnemo_topic_list() — discovery of active topics
    - Topics support both freeform names ('deploy-watch') and session-derived addresses (e.g. 'session:repo=mnemo', 'session:latest@~/work/ytt') so callers don't need to track UUIDs
    - Schema lives in its own messages table, not commingled with transcripts/docs/commits
    - Documentation includes the three usage patterns (polite poll, UserPromptSubmit hook, /loop watcher) with at least one worked example of the hook pattern
    - Two separate Claude Code sessions can demonstrably round-trip a message via the bus
    context: |-
      Claude Code has no native primitive for one running session to message another. SendMessage is intra-session only (sibling subagents). RemoteTrigger spawns a fresh remote session with a preconfigured prompt — fire-and-forget, not addressed at a specific running instance. The user wants a lightweight, MCP-resident bus that works with stock Claude Code.

      mnemo is the natural host: already an MCP server everyone has registered, already has SQLite and a file-watcher, and already knows the session inventory — which means messages can be addressed to logical destinations like 'the session most recently active in ~/work/foo' instead of UUIDs the user has to track.

      The cost is conceptual: mnemo turns from pure observer/indexer into something with a write side. Mitigate by keeping the schema partitioned (messages table separate from transcripts/docs/commits) and tool naming distinct (mnemo_message_*).

      Polling reality: Claude has no event loop, so a session can't be interrupted mid-turn. Three usage patterns enabled by a pull-based bus: explicit polite poll, UserPromptSubmit hook that calls mnemo_message_recv and prepends new messages to the user's prompt (the slick pattern — sessions feel each other naturally), and /loop watchers that poll each tick.

      Forms a sister capability to 🎯T40 (mnemo_repos enrichment) — both extend mnemo's surface to absorb responsibilities currently scattered across other tools or unfilled.
    origin: discovered while exploring whether Claude sessions can message each other's agents — user proposed mnemo as the host since jevons is too heavyweight
    discovered: 2026-04-26
