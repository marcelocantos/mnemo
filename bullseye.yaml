  T20:
    name: Image embeddings enable semantic and visual similarity search
    status: identified
    value: 5.0
    cost: 8.0
    observable: true
    acceptance:
    - Every image in the images table has a CLIP/SigLIP-family embedding (or recorded error); additive to descriptions and OCR
    - Local SigLIP or MetaCLIP model used for inference (no remote API, no per-image cost)
    - 'image_embeddings table stores: image_id, model, dim, vector (float32 BLOB), error, created_at'
    - mnemo_images supports semantic text search mode (query → embed text → k-NN against image embeddings)
    - mnemo_images supports visual similarity mode (image_id input → k-NN against other images by embedding cosine distance)
    - 'Retroactive backfill: all existing images get embeddings at startup via a background worker'
    - k-NN search is brute-force in Go (sufficient for the current corpus size ~1000 images; SIMD-friendly cosine similarity); sqlite-vec can be added later if corpus grows past ~100k images
    - 'Graceful fallback: if the embedding helper (Python script or binary) is unavailable, images still stored, embeddings skipped with clear log'
    - mnemo_images search mode selectable via a 'mode' parameter ('text'|'semantic'|'similar') with 'text' (FTS over description+OCR) as default
    context: 'Complements 🎯T18 (AI descriptions) and OCR. Descriptions + OCR rely on string-match via FTS5. CLIP-family embeddings add semantic search (''architecture diagram'' matches ''block diagram'' matches ''system layout drawing'') and visual similarity (''find images like this one''). For mnemo''s small corpus (~1000 images, growing slowly), brute-force cosine similarity in Go is fine — 1000 * 768 float32 = 3MB, single pass in <1ms. sqlite-vec extension is available if we want to scale but not needed yet. Implementation path: Python helper script using `open_clip_torch` or `sentence-transformers` with SigLIP 2 (siglip2-base-patch16-224 or similar). Python is already the user''s tool of choice (uv-managed venv). The script takes an image path and emits JSON {model, dim, vector} on stdout. Go shells out. For text embedding (query side of semantic search), same script with --mode=text. Store embeddings as little-endian float32 BLOBs for compact storage and fast decode. Schema addition assumes T19 (OCR) lands first, bumping to 18.'
    tags:
    - ingest
    - observability
    - images
    - ai
    origin: manual
    discovered: 2026-04-14
