  T60:
    name: Stale daemon_connections rows are reliably marked closed
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'daemon_connections rows are no longer left perpetually open: after a stale period (default 10 min since last_seen_at update), closed_at is populated by a periodic sweeper'
    - The sweeper is a goroutine in internal/registry/registry.go alongside the other workers (compaction, vault, CI poll); interval and stale threshold are configurable via Config
    - Existing call sites of RecordConnectionOpen and RecordConnectionSession continue to update last_seen_at so the sweeper has fresh signal for live connections
    - After running mnemo daemon overnight, the count of daemon_connections rows with closed_at IS NULL is bounded by the number of actually-live mcpbridge connections (typically 1-3), not the cumulative open count since daemon start
    - 'Optional: HTTP MCP server connection-close handler also calls RecordConnectionClose for faster reaping when the disconnect is cleanly observable; sweeper remains the authoritative cleanup path'
    context: |-
      internal/store/connections.go:45 defines RecordConnectionClose but no production code path calls it. Grep across the repo confirms zero non-test call sites. As a result, every daemon_connections row inserted by RecordConnectionOpen (tools.go:534) is orphaned — the live DB currently has 35 rows with closed_at IS NULL versus ~1-2 actual live mcpbridge connections.

      This is inert today (the watcher reaps stale per-connection workers on its own poll, and after 🎯T59 the compactor stops using daemon_connections at all), but the table grows unbounded and any query/health check that filters on `closed_at IS NULL` returns nonsense.

      **Two viable fixes**:

      1. Hook the HTTP MCP server's connection-close lifecycle (mark3labs/mcp-go on :19419) to call RecordConnectionClose. Correct but fragile: missed on daemon crash, process kill, network drop without TCP FIN.

      2. Periodic sweep: a background sweeper marks connections closed when last_seen_at is older than some threshold (e.g. 10 minutes since the last RecordConnectionOpen / RecordConnectionSession update). Robust against crashes; consistent with the heuristic-driven model adopted in 🎯T59.

      Recommendation: ship (2) as the primary mechanism, optionally wire (1) on top for faster reaping when the close is cleanly observable. The sweeper interval and stale threshold are configurable.

      This target is small and independent — does not depend on T49/T59. Discovered 2026-05-14 while investigating the compactor wiring gap.
    origin: manual
    discovered: 2026-05-14
    achieved: 2026-05-20
  T61:
    name: Automated periodic backups of mnemo.db
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Daemon goroutine snapshots ~/.mnemo/mnemo.db daily during a 03:00–04:00 local window using VACUUM INTO + gzip, written to ~/.mnemo/backups/mnemo-YYYYMMDDTHHMMSSZ.db.gz
    - Backup only fires after observing ≥15 min of write quiescence within the 03–04 window; if no quiescence by end-of-window+1h, the day is skipped and logged
    - Pre-migration backup fires synchronously from applySchema when sqlift.Diff is non-empty, tagged in the same daily pool (shared retention)
    - Retention keeps last N (default 7) backups; older snapshots GC'd after each successful backup
    - 'BackupConfig is part of Config and hot-reloadable via mnemo_config: Enabled bool (default true), Dir string (default ~/.mnemo/backups), KeepDailies int (default 7), WindowStart/WindowEnd time-of-day strings, QuiescenceMin duration'
    - 'Activity tracking: Store exposes LastWriteAt() updated by ingest + backfill + vault + similar write paths'
    - MCP tool mnemo_backup_status lists existing backups with size, age, and source (daily / pre-migration)
    - 'MCP tool mnemo_backup_now triggers an immediate backup (manual override) with idempotency: skips if a backup ran within the last hour unless force=true'
    - 'Backup output is a valid SQLite DB: open it, count rows in entries, verify against live DB''s count (within tolerance for any concurrent ingest)'
    - On-disk layout designed so future optimization (zstd-dict, chunked dedup) can replace gzip without breaking the file-naming/scanning logic
    - 'Tests cover: Backup() produces openable SQLite, retention GC keeps only last N, quiescence check skips when activity recent, pre-migration tag survives daily GC for at least one cycle'
    context: |-
      Independent of migration safety, mnemo should periodically snapshot its DB so users have a recovery path against any failure mode — bad migration, corruption, accidental rm, ransomware, disk fault. Live DBs are now multi-GB; replaying from JSONL is impossible because Claude Code rotates transcripts. Backups become the only path to recovery.

      Empirical measurements on a 7.1 GB live DB:
      - VACUUM INTO is ~35s, deterministic (consecutive runs produce byte-identical output), works against a running daemon (mode=ro client takes a shared lock)
      - gzip -1 produces 1.9 GB in ~40s; gzip -6 trims another 200 MB for an extra 50s. -1 is the right tradeoff at 3am.
      - Disk math: 1.7 GB × 7 dailies ≈ 12 GB at this scale; ~1.5 GB for a 500 MB DB user.

      Decided design (per user 2026-05-18):
      - Start with gzip full snapshots (MVP); layout designed so future zstd-dict or chunked dedup can drop in
      - On by default with retention=7
      - Pre-migration backups share the daily pool (cheaper on disk; trade-off accepted)
      - 03:00–04:00 local random scheduling within the window
      - ≥15 min quiescence required to actually fire
      - Manual override via mnemo_backup_now

      Future optimization opportunity: consecutive snapshots are byte-identical when no logical changes occurred. zstd-with-baseline-dict could drop power-user storage from 12 GB to ~5-6 GB at ~300 LOC; chunked dedup gets to ~2-3 GB at ~1000 LOC. Track as a follow-up target if disk pressure surfaces.
    origin: manual
    discovered: 2026-05-18
    achieved: 2026-05-18
  T62:
    name: Daemon eager-starts default user's workers at boot
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - At daemon startup, after `default user` is logged, main.go invokes `Registry.ForUser(defaultUser)` once — synchronously enough to fail loud if store init fails, but the worker goroutines themselves stay async
    - Backup worker (and all other per-user workers — compactor, reviewer, CI poller, reconciler, vault, ingest watcher) start at daemon boot rather than on the first MCP tool call
    - 'Verified empirically: `tail /opt/homebrew/var/log/mnemo.log` immediately after `brew services restart marcelocantos/tap/mnemo` shows `backup: worker starting` and `compact: watcher starting` without an intervening MCP call'
    - First daily backup fires within the next 03:00-04:00 local window after a daemon restart, with no human MCP traffic required
    - Multi-user lazy startup still works — `ForUser(otherUser)` on a non-default user continues to fire only on demand
    context: |-
      The 🎯T61 backup worker (and every other per-user worker) is wired into `Registry.ForUser`, which is invoked lazily on the first MCP tool call after a daemon boot. For an active user this is invisible. For a passive setup — `brew services` daemon with no Claude session connected — the worker never starts, so the supposedly-automated daily backup never fires.

      Discovered 2026-05-19 while verifying v0.39.0's backup behaviour on the live install: the daemon had been up 24h since the v0.39.0 brew restart, but the log between startup and the first manual MCP call showed zero worker activity. As soon as `mnemo_backup_status` ran, the worker logged "next attempt scheduled" and the system started behaving as expected.

      The fix is small: at daemon startup, after `default user` is logged, call `Registry.ForUser(defaultUser)` explicitly so workers spin up at boot instead of waiting for traffic. The per-user abstraction stays where it is (real for the Windows-Service multi-tenant case); we just stop deferring the default user's initialization.

      Per-MCP-client lazy initialization is a separate concern that doesn't apply here — `ForUser` is keyed by OS user, not by connection.
    origin: manual
    discovered: 2026-05-19
    achieved: 2026-05-19
  T63:
    name: Cost reconciliation is gated by explicit opt-in config, not by ambient ANTHROPIC_ADMIN_API_KEY presence
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - A new config key (e.g. cost_reconciliation_enabled bool, default false) lives in ~/.mnemo/config.json and is consulted by StartReconciler in internal/store/reconciler.go before any Admin API call.
    - With the config flag off (the default), the reconciler exits early on startup with an informational log line and makes ZERO outbound Admin API calls, regardless of whether ANTHROPIC_ADMIN_API_KEY is set in the environment.
    - With the config flag on AND the key present, the reconciler runs as today.
    - With the config flag on AND the key missing, the reconciler logs the existing key-missing warning and exits.
    - Documentation (CLAUDE.md or a README section) describes reconciliation as opt-in and explains the rationale (security-reviewed environments where unsolicited Admin API egress is undesirable).
    - An mnemo_config write that flips the flag is hot-reloaded into a running daemon (start/stop the reconciler goroutine without a restart), consistent with the existing hot-reload coverage.
    context: |-
      User feedback 2026-05-21: \"Cost reconciliation will need to be an opt-in feature. I often operate in environments where those APIs are not available, and I don't want to have security teams ask questions about why I'm trying to call these APIs.\"

      Today's behaviour (internal/store/reconciler.go:57-83): StartReconciler reads ANTHROPIC_ADMIN_API_KEY from the environment and, if present, immediately polls the Anthropic Admin API once and then every reconcilerInterval (1 minute) for the lifetime of the daemon. There is no config-level gate. If the user has the key set for any other tool, mnemo silently starts hitting the Admin API.

      This is the wrong default for environments with security review on outbound egress. The fix is to add an explicit boolean (e.g. `cost_reconciliation_enabled`) in ~/.mnemo/config.json, default false, that StartReconciler must check first. Key presence is necessary but not sufficient.

      Distinct from 🎯T46: T46 is about *delivering* the reconciled-mode value (verification, key wiring, production rollout). This target is about *gating* the feature so its existence doesn't impose a security-review burden by default. Both can ship independently — this one is small (one config field, one early-return branch, doc update, hot-reload hook) and should ship first so that T46's eventual resumption doesn't widen the surface.
    origin: manual
    discovered: 2026-05-20
    achieved: 2026-05-20
