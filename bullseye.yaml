      - github (15m): ciRepos + pollGitHubForRepo — replaces the boot-only backfillGitHubActivity (previously no periodic refresh at all).
      - commits (30m): knownRepoRoots (name→root resolved once per pass) + ingestGitCommits — replaces the boot-only backfillGitCommits.

