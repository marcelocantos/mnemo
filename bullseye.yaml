  T91:
    name: mnemo's background workers stay cheap at idle — no busy-loop CPU burn from the compaction scan, mirror reconcile, or image worker pools
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - 'The compaction-candidate scan does not re-sum the entries table on every tick when nothing changed: an O(1) activity gate skips the expensive SelectCompactionCandidates query when no new assistant entries have been ingested and no compaction has completed since the last scan (and last backlog was 0). Verified by the ''compact: scan'' log no longer firing a multi-second scan every interval while the daemon is idle.'
    - 'The mirror reconcile no longer retries a failing (repo, stream) every pass: a per-(repo,stream) failure backoff (additive nullable mirror_status columns) means a repo whose gh/git reconcile fails is not re-attempted until a backoff window elapses, so failing repos stop spawning a subprocess every reconcile pass. Verified by the per-pass ''reconcile failed'' / ''git log failed'' volume dropping sharply for persistently-failing repos.'
    - 'The image describer/OCR backfill does not spawn a worker fan-out that scans the images table when there is no pending work: a cheap pending-count gate runs before spawning workers, and the worker count is bounded well below NumCPU. Verified by no image-worker activity (and no concurrent images-table BLOB scans) when all images are already described/OCR''d.'
    - All changes are additive under the append-only schema policy (sqlift ApplyOptions{} / AllowNone passes); go test -tags sqlite_fts5 ./... is green.
    - After deploying the fixed daemon, the sustained idle CPU is re-measured and the contribution of these three workers is gone; any residual continuous load is documented for follow-up.
    context: 'Diagnosed 2026-06-21 while investigating a ~2.3-core sustained burn in the brew daemon (master @ 0.52.0). Root acute cause (two daemons sharing one DB → 985 MB WAL checkpoint starvation) was already fixed by collapsing to a single daemon. Remaining: background workers made pathological by the 15 GB DB. Three confirmed defects: (1) SelectCompactionCandidates (internal/store/compactions.go) re-sums output+cache_creation over all assistant entries for every session every 60s even when candidates=0 — 15-22s/scan, ~0.3 cores continuous; (2) ReconcileStaleMirrors (internal/store/mirrors.go) does not advance any cursor when gh/git reconcile fails, so ~420 failing repo-streams are retried every pass, spawning failing subprocesses continuously; (3) StartImageDescriber/StartImageOCR (internal/store/image_describer.go, image_ocr.go) spawn up to NumCPU(=16) workers each running SELECT img.id, img.bytes FROM images WHERE NOT EXISTS(...) — a BLOB-reading scan of the images table — a latent 16-way bomb on the next image-backfill pass. NOTE: these three do NOT explain a separately-observed continuous ~1.8-core floor (~4 concurrent sqlite3_step reads) whose query identity could not be determined from the stripped release binary; per user decision, fix these three first and re-measure, then profile the residual if it remains. Separate objective from the threads-navigator work (branch daemon-idle-cpu, off master).'
    tags:
    - perf
    - daemon
    - cpu
    - compactor
