  T102:
    name: mnemo has a plugin system — capabilities are added through a uniform extension surface, not bespoke core edits
    status: converging
    value: 0.0
    cost: 0.0
    acceptance:
    - Plugins are added, enabled/disabled, and parameterised entirely through ~/.mnemo/config.json (hot-reloaded), never by rebuilding mnemo; no plugin type is compiled into the mnemo binary.
    - 'One HTTP plugin protocol serves every host uniformly: an mnemo-launched child process (random port via a stdout handshake), a connect-mode already-running server (configured URL), or an in-process interpreted (Lua/goja) component — all conforming to the same manifest + facet + UI contract and addressable under /plugins/<name>/.'
    - 'Every extension point is reachable via the protocol with zero core edits: derived-stream reconciler, diag/health check, notifier/output sink, a reusable signal-source primitive, MCP tool, and a UI surface (a reverse-proxied website that appears as a popup menu item with a live WKWebView preview, WebSocket/SSE streaming, and force-reload).'
    - Backend facets ride the existing single scheduler (T68.7), diag registry (T83) and notifier via HTTP-delegating adapters — no plugin introduces its own scheduler or bespoke core wiring.
    - 'Proof-of-surface: at least one existing capability is re-expressed as a plugin with no behaviour change, and the automation-liveness use-case maps entirely onto the surface with zero core edits.'
    - 'Boundaries preserved: loop-safety exclusion fence (T52), opt-in external egress, additive-only schema, and the single-scheduler/reconciler model are honoured; disable/hot-reload tears a plugin down cleanly; the keep-open trust posture (plugin pages share the local origin) is an explicit, documented decision.'
    context: |-
      The user wants the extensibility *mechanism* raised as its own objective, decomposed into a target graph with T102 as the single final target driven by /goal.

      MECHANISM (decided in the 2026-07-01 design discussion, superseding the earlier 'likely compiled-in first cut' framing):
      - Plugins are OUT-OF-PROCESS by default and must never require rebuilding mnemo. Go -buildmode=plugin (.so) and compiled-in Go registries are rejected: no Windows support, CGO/sqlite_fts5 ABI lock-step, exact-version lock, no unload.
      - One HTTP protocol is the whole contract (the UI requirement already forces every plugin to run an HTTP server, so backend facets reuse the same server rather than adding gRPC/MCP). A plugin exposes a required manifest/describe endpoint + facet endpoints (signal/reconcile/check/notify) + its own UI routes and custom APIs, all under /plugins/<name>/.
      - Two transports, MCP-style, both available: LAUNCH (mnemo spawns an executable and learns its random port from the child's stdout handshake; mnemo owns lifecycle — preferred) and CONNECT (mnemo attaches to an already-running server at a configured URL). Plus an in-process interpreted (Lua/goja) host that presents via the same HTTP protocol, for lightweight no-process plugins.
      - mnemo reverse-proxies /plugins/<name>/* to the instance (WS/SSE upgrades forwarded), keeping the plugin same-origin with :19419 so there is no CORS.
      - Backend facets are thin HTTP-delegating adapters over the EXISTING machinery: StreamReconciler (T68.7), diag.Registry/Check (T83), Notifier. The scheduler/diag/notifier are reused, not replaced. Prior art for supervision: shimSupervisor + the claudia broker.
      - UI: GET /api/plugins enumerates menu contributions; the Swift shim renders them data-driven (footer rows and/or a tab); the popup preview loads a live URL in the existing WKWebView (URLRequest, not static loadHTMLString) so JS/WS work; force-reload rides a plugin.reload event on the T86 SSE hub.
      - Config: declared in ~/.mnemo/config.json (transport, enable, params), hot-reloaded like vault_path; metadata discovered via the plugin's manifest endpoint; ~/.mnemo/plugins/<name>/ is an optional default home.
      - Trust: keep-open — plugin pages may reach the auth-less /api/* on the shared localhost origin (conscious single-user decision, documented).
      - MCP-tool plugins fall out nearly for free: a plugin that declares an MCP endpoint has its tools bridged in via the T15 federation machinery.

      MOTIVATING CONSUMER: automation-liveness (former T98, born from a 9-day silent ytt stall) exercises nearly every extension point (signal-source + reconciler + check + notifier + UI + config) and needs almost no new code. Per the user's sequencing it is NOT part of this objective: T102 proves implementability (proof-of-surface + a written zero-core-edit walkthrough), and automation-liveness is re-raised afterward as a separate downstream target under a fresh id depending on T102 (id T98 is unusable — git-history collision). Old sketch: docs/design/automation-liveness-plugin.md (history, commit 62dc4b4).

      SHAPE: contract-first — T102.1 pins the protocol; transports (T102.3 connect, T102.4 launch), serving (T102.5 proxy, T102.6 interp), facets (T102.7, T102.8 signals), UI (T102.9) and MCP (T102.10) fan out; T102.11 (proof) and T102.12 (boundaries) converge. T102 is the aggregate umbrella.
    depends_on:
    - T102.1
    - T102.2
    - T102.3
    - T102.4
    - T102.5
    - T102.6
    - T102.7
    - T102.8
    - T102.9
    - T102.10
    - T102.11
    - T102.12
    tags:
    - plugins
    - architecture
    - extensibility
    - design
    origin: manual
    discovered: 2026-06-30
