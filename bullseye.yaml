  T84:
    name: A repeatedly-failing background task trips a circuit-breaker and halts/backs-off instead of hammering CPU and contending shared resources
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 3.0
    acceptance:
    - 'A reusable circuit-breaker primitive exists: a unit of work that fails K consecutive times trips open and halts (or backs off to a long interval); after a cooldown it half-opens for a single trial and closes on success. State + last error are queryable.'
    - 'The convergence/worker engine applies the breaker so any repeatedly-failing task halts rather than retrying hot: at minimum the compaction watcher (worker-level systemic failure, distinct from T77''s per-session quarantine) and the StreamReconciler loop. A broken task stops consuming CPU and stops contending the single SQLite writer, so it cannot starve ingest or other workers.'
    - 'Concretely: a compactor whose every tick fails (e.g. the T82 cwd scenario, or claude missing from PATH) trips the breaker within K failures, logs the condition once, and pauses — co-running ingest continues to make progress.'
    - 'Breaker state is observable and feeds the diagnostics suite (T83): a tripped breaker surfaces as a fail-severity health check carrying the failure count and last error.'
    - 'Tests: the breaker trips after K consecutive failures, backs off, half-opens, and recovers on success; and a failing worker under the breaker does not block a concurrently-running worker (no starvation).'
    context: Requested 2026-06-18 alongside T82/T83. The cwd bug (T82) caused unbounded per-tick retries that ate CPU and starved the indexer. T77 added per-session compaction quarantine, but that is per-item; there is no generic per-task safety net, so a systemic failure (every item fails for the same external reason — missing cwd, claude not on PATH, DB locked) hammers indefinitely. Build a generic circuit-breaker into the worker/convergence engine so the failure class is contained regardless of cause. Layers with T82 (don't create the bad condition) and T83 (surface it).
    origin: manual
    discovered: 2026-06-18
    achieved: 2026-06-18
