  T39:
    name: The Homebrew formula's launchd service block invokes mnemo with arguments that match an actual subcommand or flag, not a phantom "serve" positional that only works because main.go silently ignores it
    status: achieved
    value: 0.0
    cost: 0.0
    showcase: true
    demonstration: Verified the deployed Homebrew formula at marcelocantos/homebrew-tap (Formula/mnemo.rb at v0.33.0) has `run [opt_bin/"mnemo"]` with no phantom "serve" arg. The fix landed via `formula_includes:` in .github/workflows/release.yml (commit 41630d2, the 🎯T47 PR), so it survives homebrew-releaser regeneration. main.go documents the bare invocation as the serve mode in both the package doc (line 10) and the inline switch comment in main() (lines 70–73), satisfying the third acceptance criterion. `brew services start mnemo` runs the daemon today via this formula.
    acceptance:
    - The mnemo Homebrew formula's `service do` block has `run [opt_bin/"mnemo"]` (no `"serve"` arg) OR mnemo gains a real `serve` subcommand that aliases the bare-invocation default behaviour and is documented in main.go's package comment / CLI help.
    - The fix lands via `formula_includes` in `.github/workflows/release.yml` (so it survives homebrew-releaser regenerating the formula), not as a manual edit to the tap repo.
    - Removing the bare-invocation default (or any future restructure of main.go's switch) does NOT silently break the launchd service — either the formula has a real subcommand to invoke, or main.go has a documented contract that the bare invocation IS the serve mode.
    context: |-
      Discovered 2026-04-26 during /release v0.30.0 verification. The Homebrew formula generated by homebrew-releaser includes `run [opt_bin/"mnemo", "serve"]` in its launchd service block, but mnemo's main.go has no `serve` subcommand. The arg falls through main.go's switch statement, then `flag.Parse` treats it as a positional, then it gets ignored and the daemon starts on its default `:19419` listener. So today it works by accident.

      Two failure modes this exposes:
      1. A future refactor of main.go's subcommand dispatch (e.g. `flag.NArg() > 0` → fail with usage) would silently break every launchd-installed mnemo on the planet without any compile-time signal.
      2. New users reading the formula reasonably assume `serve` is a real subcommand and try `mnemo serve --foo` from the shell, which silently ignores --foo.

      Two reasonable fixes:
      - A: Drop `"serve"` from the formula. `run [opt_bin/"mnemo"]` does the same thing and matches what the binary actually documents.
      - B: Add a real `serve` subcommand that's an explicit alias for the default daemon mode. Document it in main.go's package comment and the agent guide. Users gain an explicit verb; the formula stays stable; future restructures have a real call site to preserve.

      B is more work but more robust. Either approach must land via `formula_includes` in release.yml so it survives the next homebrew-releaser run.

      Forked from 🎯T37 (which added the launchd PATH fix and is where the `"serve"` arg was introduced).
    tags:
    - homebrew
    - launchd
    - cli
    - ops
    origin: forked-from 🎯T37 during /release v0.30.0 install verification
    discovered: 2026-04-26
    achieved: 2026-04-30
