  T68.1:
    name: Compaction is predicate-driven reconciliation, not recency-windowed polling
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Compaction candidate selection is expressed as a desired-state predicate — "a session is owed a compaction when it has substantive messages newer than its latest compaction's entry_id_to (or has never been compacted)" — with NO recency floor inside the predicate.
    - 'RecencyWindow becomes a scheduling-priority input (process most-recently-active candidates first) rather than a WHERE filter that drops old sessions from the candidate set (today: store.go SelectCompactionCandidates `WHERE ss.last_msg > recencyCutoff`).'
    - A historical, never-compacted session (last_msg far outside the former 24h window) eventually becomes a candidate and is compacted without manual intervention or a config override — covered by a test that seeds such a session and asserts it is selected.
    - Convergence is bounded by the per-session token budget (maxBudgetRatio) and scan throughput, not by recency; the T67 anti-tick-storm guarantee (already-compacted and budget-exhausted sessions are not re-selected indefinitely) is preserved and still covered by tests.
    - Self-exclusion (excludeCWD) and the budget pre-filter continue to apply unchanged.
    - mnemo_compactor_status surfaces the outstanding backlog (count of owed-but-uncompacted sessions) so the gap to the fixed point is observable, not silently abandoned.
    - Throughput is bounded so a large initial backlog (every historical session) does not starve live sessions or exhaust the LLM budget in one scan — e.g. a per-scan compaction cap with recent sessions prioritised; whatever bound is chosen is logged, never a silent truncation.
    context: |-
      Achieved 2026-05-29. Compaction selection is now the convergence predicate "owed = new substantive messages since the latest compaction, AND (delta>=min OR idle)" with NO recency floor (internal/store/compactions.go SelectCompactionCandidates). Recency is ORDER BY last_msg DESC only. The query returns the total backlog via COUNT(*) OVER (); the watcher enforces a per-scan compaction cap (WatcherConfig.MaxCompactionsPerScan, default 20) so a large historical backlog drains over scans, recent-first, without starving live sessions or flooding the LLM — the cap is logged, never silent. mnemo_compactor_status surfaces backlog + max_compactions_per_scan; recency_window is gone. Added partial index idx_messages_session_entry_substantive for the now-full-corpus predicate. Budget pre-filter and T67 anti-tick-storm guarantee preserved. Tests: TestSelectCompactionCandidatesHistoricalBacklog (month-old never-compacted session is owed + backlog counts it), repurposed TestSelectCompactionCandidatesFilters (stale session now owed, not filtered), TestWatcherPerScanCap. Full suite + vet green.

